<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; base-uri 'none'; object-src 'none'; form-action 'self'">
  <title>Pre Cost Planning - Event Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-nav">
    <a class="brand" href="index.html">Event Dashboard</a>
    <nav aria-label="Primary navigation">
      <a href="index.html">Sales Intake</a>
      <a class="active" href="pre-cost-planning.html">Pre Cost Planning</a>
      <a href="petty-cash.html">Petty Cash</a>
      <a href="master-persons.html">Master Persons</a>
      <a href="faq.html">FAQ</a>
    </nav>
  </header>

  <main class="app-shell planning-shell">
    <section class="panel planning-panel">
      <div class="panel-header">
        <p class="eyebrow">Step 2</p>
        <h1>Pre Cost Planning</h1>
      </div>

      <form class="intake-form" id="planningForm">
        <section class="event-picker field">
          <span>Select Open Event</span>
          <button type="button" class="event-picker-trigger" id="eventPickerTrigger" aria-expanded="false" aria-controls="eventPickerList">
            Choose event
          </button>
          <div class="event-picker-menu" id="eventPickerMenu" hidden>
            <input type="search" id="eventSearch" placeholder="Search open events">
            <div class="event-picker-list" id="eventPickerList" role="listbox"></div>
          </div>
          <input type="hidden" id="selectedEventId" name="selectedEventId">
        </section>

        <label class="field">
          <span>Planning Date</span>
          <input type="date">
        </label>

        <section class="payment-schedule">
          <div class="schedule-header">
            <div>
              <p class="eyebrow">Planning Workspace</p>
              <h2>Pre Cost Inputs</h2>
            </div>
          </div>

          <div class="planning-context">
            <div>
              <span>PAX</span>
              <strong id="planningPax">0</strong>
            </div>
            <div>
              <span>No. of Days</span>
              <strong id="planningDays">0</strong>
            </div>
          </div>

          <div class="cost-grid food-cost-row">
            <label class="field">
              <span>Food Cost <small>per PAX</small></span>
              <input type="number" id="foodCostPerPax" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Total Food Cost</span>
              <output class="cost-output" id="totalFoodCost">Rs. 0.00</output>
            </label>
          </div>

          <div class="cost-grid staff-cost-row staff-table-row">
            <label class="field staff-file-field">
              <span>Staff Data File</span>
              <button type="button" class="file-placeholder" disabled>Choose file</button>
            </label>

            <div class="staff-table">
              <div class="staff-table-head">
                <span>Staff No.</span>
                <span>Total Staff Cost</span>
              </div>
              <div class="staff-table-body">
                <label>
                  <input type="number" id="staffCount" min="0" step="1" placeholder="0" aria-label="Staff No.">
                </label>
                <label>
                  <input type="number" id="totalStaffCostInput" min="0" step="0.01" placeholder="0.00" aria-label="Total Staff Cost">
                </label>
              </div>
            </div>
          </div>

          <div class="cost-grid extra-cost-row">
            <label class="field">
              <span>Equipment Depreciation</span>
              <input type="number" id="equipmentDepreciation" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Third Party Vendor</span>
              <input type="number" id="thirdPartyVendor" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Decor Charge <small>default 5% of billing</small></span>
              <input type="number" id="decorCharge" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Miscellaneous</span>
              <input type="number" id="miscellaneousCost" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field total-cost-field">
              <span>Total Cost</span>
              <output class="cost-output total-cost-output" id="totalPlanningCost">Rs. 0.00</output>
            </label>

            <label class="field total-cost-field">
              <span>Profit / Loss</span>
              <output class="cost-output profit-loss-output" id="profitLoss">Rs. 0.00</output>
            </label>
          </div>
        </section>

      </form>
    </section>
  </main>
  <script src="store.js?v=3"></script>
  <script src="data.js?v=3"></script>
  <script src="event-store.js?v=3"></script>
  <script src="pre-cost-planning.js?v=3"></script>
</body>
</html>
