<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; script-src 'self' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; base-uri 'none'; object-src 'none'; form-action 'self'">
  <title>Pre Cost Planning - Event Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=5"></script>
  <script src="firebase-backend.js?v=5"></script>
  <script src="firebase-auth.js?v=5"></script>
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-bar">
      <a class="brand" href="index.html"><img src="logo.svg" alt="ODC" width="32" height="32" style="border-radius:8px;vertical-align:middle;margin-right:4px"> Event Dashboard</a>
      <div id="nav-user" class="nav-user"></div>
    </div>
    <nav class="top-nav-links" aria-label="Primary navigation">
      <a href="index.html">Sales Intake</a>
      <a href="saved-events.html">Saved Events</a>
      <a class="active" href="pre-cost-planning.html">Pre Cost Planning</a>
      <a href="petty-cash.html">Petty Cash</a>
      <a href="master-persons.html">Master Persons</a>
      <a href="bill-submission.html">Bill Submission</a>
      <a href="faq.html">FAQ</a>
    </nav>
  </header>

  <main class="app-shell planning-shell">
    <section class="panel planning-panel">
      <div class="panel-header">
        <p class="eyebrow">Step 2</p>
        <h1>Pre Cost Planning</h1>
      </div>

      <form class="intake-form" id="planningForm">
        <section class="event-picker field">
          <span>Select Open Event</span>
          <button type="button" class="event-picker-trigger" id="eventPickerTrigger" aria-label="Choose event" aria-expanded="false" aria-controls="eventPickerList">
            Choose event
          </button>
          <div class="event-picker-menu" id="eventPickerMenu" hidden>
            <input type="search" id="eventSearch" placeholder="Search open events">
            <div class="event-picker-list" id="eventPickerList" role="listbox"></div>
          </div>
          <input type="hidden" id="selectedEventId" name="selectedEventId">
        </section>

        <label class="field">
          <span>Planning Date</span>
          <input type="text" class="date-dmy" placeholder="DD-MM-YYYY" autocomplete="off">
        </label>

        <label class="field planning-zone-field">
          <span>Zone</span>
          <input type="text" id="planningZone" readonly placeholder="Select event first">
        </label>

        <label class="field planning-zone-extra" id="planningZoneExtraField" hidden>
          <span>City</span>
          <input type="text" id="planningZoneCity" readonly placeholder="Outstation city">
        </label>

        <section class="outstation-costs" id="outstationCostsSection" hidden aria-labelledby="outstationCostsTitle">
          <div class="section-heading">
            <p class="eyebrow">Outstation Costs</p>
            <h2 id="outstationCostsTitle">Additional Charges</h2>
          </div>

          <div class="cost-grid outstation-grid">
            <label class="field">
              <span>Staff Transportation Charge</span>
              <input type="number" id="staffTransportationCharge" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Staff Accommodation Charge</span>
              <input type="number" id="staffAccommodationCharge" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Staff Food Cost <small>1000 * Staff No.</small></span>
              <input type="number" id="staffFoodCost" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Refeervan</span>
              <input type="number" id="refervanCharge" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Equipment Transportation</span>
              <input type="number" id="equipmentTransportationCharge" min="0" step="0.01" placeholder="0.00">
            </label>
          </div>
        </section>

        <section class="payment-schedule">
          <div class="schedule-header">
            <div>
              <p class="eyebrow">Planning Workspace</p>
              <h2>Pre Cost Inputs</h2>
            </div>
          </div>

          <div class="planning-context">
            <div>
              <span>PAX</span>
              <strong id="planningPax">0</strong>
            </div>
            <div>
              <span>No. of Days</span>
              <strong id="planningDays">0</strong>
            </div>
          </div>

          <div class="cost-grid food-cost-row">
            <label class="field">
              <span>Food Cost <small>per PAX</small></span>
              <input type="number" id="foodCostPerPax" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Total Food Cost</span>
              <output class="cost-output" id="totalFoodCost">Rs. 0.00</output>
            </label>
          </div>

          <div class="cost-grid staff-cost-row staff-table-row">
            <label class="field staff-file-field">
              <span>Staff Data File</span>
              <button type="button" class="file-placeholder" disabled>Choose file</button>
            </label>

            <div class="staff-table">
              <div class="staff-table-head">
                <span>Staff No.</span>
                <span>Total Staff Cost</span>
              </div>
              <div class="staff-table-body">
                <label>
                  <input type="number" id="staffCount" min="0" step="1" placeholder="0" aria-label="Staff No.">
                </label>
                <label>
                  <input type="number" id="totalStaffCostInput" min="0" step="0.01" placeholder="0.00" aria-label="Total Staff Cost">
                </label>
              </div>
            </div>
          </div>

          <div class="cost-grid extra-cost-row">
            <label class="field">
              <span>Equipment Depreciation</span>
              <input type="number" id="equipmentDepreciation" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Third Party Vendor</span>
              <input type="number" id="thirdPartyVendor" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Decor Charge <small>default 5% of billing</small></span>
              <input type="number" id="decorCharge" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field">
              <span>Miscellaneous</span>
              <input type="number" id="miscellaneousCost" min="0" step="0.01" placeholder="0.00">
            </label>

            <label class="field total-cost-field">
              <span>Total Cost</span>
              <output class="cost-output total-cost-output" id="totalPlanningCost">Rs. 0.00</output>
            </label>

            <label class="field total-cost-field">
              <span>Profit / Loss</span>
              <output class="cost-output profit-loss-output" id="profitLoss">Rs. 0.00</output>
            </label>
          </div>
        </section>

      </form>
    </section>
  </main>
  <script src="store.js?v=5"></script>
  <script src="data.js?v=5"></script>
  <script src="event-store.js?v=5"></script>
  <script src="pre-cost-planning.js?v=5"></script>
</body>
</html>
