<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#162032"/>
    </linearGradient>
    <linearGradient id="green-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="30" fill="url(#bg)"/>

  <!-- Green accent bar (left side, brand identity) -->
  <rect x="13" y="22" width="5" height="156" rx="2.5" fill="url(#green-bar)"/>

  <!-- Cloche / plate icon -->
  <!-- Plate base line -->
  <line x1="50" y1="70" x2="158" y2="70" stroke="#059669" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <!-- Dome arc -->
  <path d="M 54 70 Q 104 28 154 70" fill="none" stroke="#059669" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <!-- Handle -->
  <circle cx="104" cy="31" r="3.5" fill="#10b981" opacity="0.8"/>
  <line x1="104" y1="34.5" x2="104" y2="41" stroke="#10b981" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Main ODC lettering -->
  <text
    x="104" y="133"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-weight="900"
    font-size="70"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-2">ODC</text>

  <!-- Thin divider -->
  <line x1="30" y1="151" x2="174" y2="151" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Tagline -->
  <text
    x="104" y="172"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-weight="400"
    font-size="11"
    fill="#64748b"
    text-anchor="middle"
    letter-spacing="4.5">CATERING</text>
</svg>
