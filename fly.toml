app = "odc-catering"
primary_region = "bom"

[build]

[env]
  PORT = "5050"
  DB_PATH = "/data/odc.db"

[mounts]
  source = "odc_data"
  destination = "/data"

[http_service]
  internal_port = 5050
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
