<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; script-src 'self' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; base-uri 'none'; object-src 'none'; form-action 'self'">
  <title>Sign In — K. Girdharlal ODC</title>
  <link rel="stylesheet" href="styles.css?v=14">
</head>
<body class="login-body">
  <main class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <img src="logo.svg" alt="ODC" width="48" height="48" style="border-radius:10px;flex-shrink:0">
        <div>
          <p class="eyebrow" style="margin-bottom:2px">K. Girdharlal</p>
          <h1 style="font-size:1.5rem;margin:0">Outdoor Catering</h1>
          <p class="login-caption">Operations workspace</p>
        </div>
      </div>
      <form id="loginForm" class="login-form" novalidate>
        <label class="field">
          <span>Username</span>
          <input type="text" id="username" name="username" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" required placeholder="Enter username">
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="Enter password">
        </label>
        <p id="loginError" class="login-error" hidden role="alert" aria-live="polite"></p>
        <button type="submit" class="primary-button login-submit" id="loginBtn" style="width:100%;padding:10px 16px;font-size:0.95rem">Sign In</button>
      </form>
    </div>
  </main>
  <script src="login.js?v=7"></script>
</body>
</html>
