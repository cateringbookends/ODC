<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Data to Firebase</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=5"></script>
</head>
<body style="padding:2rem;font-family:system-ui,sans-serif;max-width:600px;margin:0 auto">
  <h1 style="color:#0f172a">Import SQLite Data → Firebase</h1>
  <p style="color:#64748b">Run <code>node export-data.js</code> first, then upload the JSON here.</p>

  <div id="authArea" style="margin:1.5rem 0;padding:1rem;background:#f1f5f9;border-radius:8px">
    <label style="display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem">Admin Username</label>
    <input id="uname" value="aiops" style="padding:.5rem;border:1px solid #cbd5e1;border-radius:6px;width:200px">
    <label style="display:block;font-size:.85rem;font-weight:600;margin-top:.8rem;margin-bottom:.4rem">Password</label>
    <input id="pwd" type="password" value="AIops" style="padding:.5rem;border:1px solid #cbd5e1;border-radius:6px;width:200px">
    <br><button id="loginBtn" onclick="doLogin()" style="margin-top:.8rem;padding:.5rem 1.2rem;background:#059669;color:white;border:none;border-radius:6px;cursor:pointer">Login to Firebase</button>
    <p id="loginStatus" style="color:#64748b;font-size:.85rem;margin-top:.5rem"></p>
  </div>

  <div id="importArea" style="margin:1.5rem 0">
    <label style="display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem">Select odc-export.json</label>
    <input type="file" id="fileInput" accept=".json" style="margin-bottom:1rem">
    <br>
    <button id="importBtn" onclick="doImport()" disabled style="padding:.6rem 1.5rem;background:#0f172a;color:white;border:none;border-radius:6px;cursor:pointer;opacity:.5">Import to Firebase</button>
  </div>

  <pre id="log" style="background:#0f172a;color:#10b981;padding:1rem;border-radius:8px;font-size:.82rem;min-height:100px;overflow:auto;white-space:pre-wrap"></pre>

<script>
var logEl = document.getElementById("log");
function log(msg) { logEl.textContent += msg + "\n"; logEl.scrollTop = logEl.scrollHeight; }

async function doLogin() {
  var uname = document.getElementById("uname").value.trim();
  var pwd   = document.getElementById("pwd").value;
  var statusEl = document.getElementById("loginStatus");
  try {
    await ODC_AUTH.signInWithEmailAndPassword(uname + "@odc.local", pwd);
    statusEl.textContent = "✓ Logged in as " + uname;
    statusEl.style.color = "#059669";
    document.getElementById("importBtn").disabled = false;
    document.getElementById("importBtn").style.opacity = "1";
    log("Logged in as " + uname);
  } catch(e) {
    statusEl.textContent = "Login failed: " + e.message;
    statusEl.style.color = "#dc2626";
  }
}

async function doImport() {
  var file = document.getElementById("fileInput").files[0];
  if (!file) { log("Select a file first"); return; }
  var btn = document.getElementById("importBtn");
  btn.disabled = true;
  btn.textContent = "Importing…";

  try {
    var text = await file.text();
    var data = JSON.parse(text);
    var db   = ODC_DB;

    log("Starting import...");

    // Events
    log("Importing " + (data.events||[]).length + " events...");
    var batch = db.batch();
    var count = 0;
    for (var ev of (data.events || [])) {
      batch.set(db.collection("events").doc(ev.id), ev);
      count++;
      if (count % 400 === 0) { await batch.commit(); batch = db.batch(); }
    }
    await batch.commit();
    log("✓ Events done");

    // Master persons
    if (data.masterPersons) {
      await db.collection("config").doc("masterPersons").set({ heads: data.masterPersons, updatedAt: new Date().toISOString() });
      log("✓ Master persons done (" + data.masterPersons.length + " heads)");
    }

    // Petty cash
    var pcCount = 0;
    var pcBatch = db.batch();
    for (var [eid, pdata] of Object.entries(data.pettyCash || {})) {
      pcBatch.set(db.collection("pettyCash").doc(eid), { payouts: pdata.payouts||[], petty: pdata.petty||[] });
      pcCount++;
    }
    await pcBatch.commit();
    log("✓ Petty cash done (" + pcCount + " events)");

    // Pre-cost
    var preBatch = db.batch();
    var preCount = 0;
    for (var [eid2, pd] of Object.entries(data.preCost || {})) {
      preBatch.set(db.collection("preCost").doc(eid2), pd);
      preCount++;
    }
    await preBatch.commit();
    log("✓ Pre-cost done (" + preCount + " events)");

    // Bills
    log("Importing " + (data.bills||[]).length + " bills...");
    for (var bill of (data.bills || [])) {
      await db.collection("bills").add(bill);
    }
    log("✓ Bills done");

    log("\n✅ Import complete! Go to index.html");
    btn.textContent = "Done!";
    btn.style.background = "#059669";
  } catch(err) {
    log("ERROR: " + err.message);
    btn.disabled = false;
    btn.textContent = "Retry Import";
  }
}
</script>
</body>
</html>
