<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; script-src 'self' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; base-uri 'none'; object-src 'none'; form-action 'self'">
  <title>Master Persons - Event Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=17">
</head>
<body>
  <script src="auth-guard.js?v=9"></script>
  <header class="top-nav">
    <div class="top-nav-bar">
      <a class="brand" href="dashboard.html"><img src="logo.svg" alt="ODC" width="32" height="32" style="border-radius:8px;vertical-align:middle;margin-right:4px"> Event Dashboard</a>
      <div id="nav-user" class="nav-user"></div>
    </div>
    <nav class="top-nav-links" aria-label="Primary navigation">
      <a href="dashboard.html">Dashboard</a>
      <a href="index.html">Sales Intake</a>
      <a href="saved-events.html">Saved Events</a>
      <a href="pre-cost-planning.html">Pre Cost Planning</a>
      <a href="petty-cash.html">Petty Cash</a>
      <a href="financial-control.html">Financial Control</a>
      <a class="active" href="master-persons.html">Master Persons</a>
      <a href="bill-submission.html">Bill Submission</a>
      <a href="analytics.html">Analytics</a>
      <a href="admin.html" data-admin-only>Admin</a>
      <a href="mail-center.html" data-admin-only>Mail Center</a>
      <a href="faq.html">FAQ</a>
    </nav>
  </header>

  <main class="app-shell planning-shell">
    <section class="panel">
      <div class="panel-header">
        <p class="eyebrow">Master Setup</p>
        <h1>Assigned Heads & Persons</h1>
      </div>

      <form class="intake-form" id="masterPersonsForm">
        <label class="field">
          <span>Post / Designation</span>
          <input type="text" id="headName" placeholder="Head Chef">
        </label>

        <label class="field">
          <span>Person Name</span>
          <input type="text" id="personName" placeholder="Assigned person">
        </label>

        <label class="field">
          <span>Employee Code</span>
          <input type="text" id="personCode" placeholder="e.g. 18">
        </label>

        <label class="field">
          <span>Department / Unit</span>
          <input type="text" id="personDepartment" placeholder="DOME, ODC, CORP">
        </label>

        <label class="field">
          <span>Location</span>
          <input type="text" id="personLocation" placeholder="Surat, Ahmedabad">
        </label>

        <label class="field">
          <span>Email</span>
          <input type="email" id="personEmail" placeholder="person@example.com">
        </label>

        <section class="payment-schedule">
          <div class="schedule-header">
            <div>
              <p class="eyebrow">Directory</p>
              <h2>Post Wise Master</h2>
            </div>
            <button type="button" class="secondary-button" id="addPerson">+ Add Person</button>
          </div>

          <label class="field master-search-field">
            <span>Search</span>
            <input type="search" id="masterSearch" placeholder="Search name, code, post, department, location">
          </label>

          <div class="master-filter-row">
            <div class="field master-department-field">
              <span>Department Filter</span>
              <select id="masterDepartmentFilter" multiple hidden></select>
              <div class="department-filter" id="departmentFilterControl"></div>
            </div>
            <div class="master-filter-actions">
              <button type="button" class="secondary-button" id="selectAllDepartments">Select All</button>
              <button type="button" class="secondary-button" id="clearDepartments">Deselect All</button>
            </div>
          </div>

          <div class="master-list" id="masterList"></div>
        </section>
      </form>
    </section>
  </main>

  <script src="store.js?v=6"></script>
  <script src="master-data.js?v=6"></script>
  <script src="master-persons.js?v=7"></script>
</body>
</html>
